name: Publish to Comfy Registry

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
